name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Trusted publishing to npm uses OIDC. No NPM_TOKEN secret needed.
# Manual setup (one time): configure the npm package as a trusted publisher
# pointing at this repo + workflow on npmjs.com.

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance + trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build core FIRST. packages/tests typechecks and imports against the
      # built dist via the workspace symlink, so without dist/ the typecheck
      # fails with "Cannot find module '@fnrhombus/claude-code-hooks'".
      - run: pnpm --filter @fnrhombus/claude-code-hooks build

      - run: pnpm -r typecheck

      - run: pnpm --filter claude-code-hooks-tests test

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/core/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
        shell: bash

      - name: Publish @fnrhombus/claude-code-hooks
        working-directory: packages/core
        # Use latest npm — pnpm publish has inconsistent OIDC behavior with
        # scoped packages. Plain npm (fresh via npx) works reliably.
        run: npx -y npm@latest publish --access public --provenance
