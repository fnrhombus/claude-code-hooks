name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

# On PRs and merge queue: cancel stale runs when new commits arrive.
# On push to main: never cancel — a publish mid-flight must complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

jobs:
  test:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build core BEFORE typecheck — packages/tests imports from the
      # workspace dep and needs dist/ to resolve it.
      - run: pnpm --filter @fnrhombus/claude-code-hooks build

      - run: pnpm -r typecheck

      - run: pnpm --filter claude-code-hooks-tests test
